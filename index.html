<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog privado de Maya</title>
    <link rel="icon" type="image/png" href="sobredosis.png?v=4">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="login-container">
                <h1 class="login-title">"Descuento" ;)</h1>
                <div id="login-form" class="login-form">
                    <input type="password" id="password-input" placeholder="Contraseña">
                    <button id="login-button">Entrar</button>
                </div>
                <div id="captcha-container" class="captcha-container hidden">
                    <p class="captcha-question">¿Qué emoción es la más importante?</p>
                    <div id="captcha-options" class="captcha-options">
                        <button class="captcha-option" data-emotion="alegria">Alegría 😊</button>
                        <button class="captcha-option" data-emotion="tristeza">Tristeza 😢</button>
                        <button class="captcha-option" data-emotion="miedo">Miedo 😨</button>
                        <button class="captcha-option" data-emotion="rabia">Rabia 😠</button>
                        <button class="captcha-option" data-emotion="amor">Amor 🥰</button>
                        <button class="captcha-option" data-emotion="sorpresa">Sorpresa 😮</button>
                    </div>
                    <button id="captcha-continue-button" class="captcha-continue-button">Enviar</button>
                </div>
                <p id="error-message" class="error-message"></p>
            </div>
        </div>

        <!-- Blog Screen -->
        <div id="blog-screen" class="screen hidden">
            <div class="blog-container">
                <header class="blog-header">
                    <h1>Blog privado de Maya</h1>
                    <p class="subtitle">Donde revelo toda la verdad</p>
                </header>

                <div class="blog-content">
                    <aside class="sidebar">
                        <nav class="sidebar-nav">
                            <button class="nav-button active" data-section="news">Noticias encubiertas</button>
                            <button class="nav-button" data-section="truth">Desvelo la verdad</button>
                        </nav>
                    </aside>

                    <main class="main-content">
                        <!-- News Section -->
                        <section id="news-section" class="content-section">
                            <h2>Noticias encubiertas</h2>
                            <div class="news-list"></div>
                        </section>

                        <!-- Truth Section -->
                        <section id="truth-section" class="content-section hidden">
                            <h2>Desvelo la verdad</h2>
                            <div id="truth-content">
                                <p id="truth-message" class="truth-message"></p>
                                <div id="video-container" class="video-container hidden">
                                    <iframe 
                                        id="truth-video"
                                        src="https://drive.google.com/file/d/1bbxv4JTc3PA4YTEDdxACXr3JwmKEPDKQ/preview" 
                                        width="100%" 
                                        height="600" 
                                        allow="autoplay"
                                        allowfullscreen
                                        frameborder="0"
                                        style="border-radius: 8px;">
                                    </iframe>
                                </div>
                                <div id="choice-buttons" class="choice-buttons hidden">
                                    <button class="pill-button red" id="truth-pill">
                                        <span class="pill-icon">💊</span>
                                        Contar la verdad
                                    </button>
                                    <button class="pill-button blue" id="medicine-pill">
                                        <span class="pill-icon">💊</span>
                                        Publicitar la pastilla
                                    </button>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            </div>
        </div>

        <!-- Consequence Screen -->
        <div id="consequence-screen" class="screen hidden">
            <div class="consequence-container">
                <div id="consequence-content"></div>
                <button id="restart-button" class="restart-button">Volver al inicio</button>
            </div>
        </div>

        <!-- News Modal -->
        <div id="news-modal" class="modal hidden">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <h2 id="modal-title"></h2>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
